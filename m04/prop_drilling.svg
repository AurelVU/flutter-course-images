<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .box{stroke-width:2;rx:6;ry:6}
    .pain{fill:#ffebee;stroke:#c62828}
    .ok{fill:#e8f5e9;stroke:#2e7d32}
    .data{fill:#fff8e1;stroke:#f9a825}
    .label{font-size:13px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}
    .arr-red{stroke:#c62828;stroke-width:2;fill:none;marker-end:url(#r);stroke-dasharray:4 3}
    .title{font-size:16px;font-weight:600;fill:#102a43;text-anchor:middle}
    .h{font-size:14px;font-weight:600;text-anchor:middle}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
    <marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Left column: prop drilling -->
  <text class="h" x="220" y="30" fill="#c62828">Без Provider: prop drilling</text>

  <rect class="box pain" x="120" y="50" width="200" height="44"/>
  <text class="label" x="220" y="76">App (хранит user)</text>

  <rect class="box pain" x="120" y="120" width="200" height="44"/>
  <text class="label" x="220" y="146">HomePage</text>
  <text class="desc" x="220" y="113" font-size="10" fill="#c62828">передаёт user дальше</text>

  <rect class="box pain" x="120" y="190" width="200" height="44"/>
  <text class="label" x="220" y="216">ProfileSection</text>
  <text class="desc" x="220" y="183" font-size="10" fill="#c62828">передаёт user дальше</text>

  <rect class="box pain" x="120" y="260" width="200" height="44"/>
  <text class="label" x="220" y="286">Header</text>
  <text class="desc" x="220" y="253" font-size="10" fill="#c62828">передаёт user дальше</text>

  <rect class="box pain" x="120" y="330" width="200" height="44"/>
  <text class="label" x="220" y="356">Avatar — наконец-то!</text>

  <line class="arr-red" x1="220" y1="94" x2="220" y2="120"/>
  <line class="arr-red" x1="220" y1="164" x2="220" y2="190"/>
  <line class="arr-red" x1="220" y1="234" x2="220" y2="260"/>
  <line class="arr-red" x1="220" y1="304" x2="220" y2="330"/>

  <text class="desc" x="220" y="400" fill="#c62828">Промежуточные виджеты ничего не делают с user</text>
  <text class="desc" x="220" y="418" fill="#c62828">Изменишь модель — правишь сигнатуры везде</text>

  <!-- Right column: Provider -->
  <text class="h" x="660" y="30" fill="#2e7d32">С Provider: внедрение сверху</text>

  <rect class="box data" x="540" y="50" width="240" height="50"/>
  <text class="label" x="660" y="72">ChangeNotifierProvider</text>
  <text class="desc" x="660" y="90">user сидит здесь</text>

  <rect class="box ok" x="560" y="130" width="200" height="36"/>
  <text class="label" x="660" y="153">HomePage</text>

  <rect class="box ok" x="560" y="180" width="200" height="36"/>
  <text class="label" x="660" y="203">ProfileSection</text>

  <rect class="box ok" x="560" y="230" width="200" height="36"/>
  <text class="label" x="660" y="253">Header</text>

  <rect class="box data" x="560" y="290" width="200" height="50"/>
  <text class="label" x="660" y="313">Avatar</text>
  <text class="desc" x="660" y="330">context.watch&lt;User&gt;()</text>

  <line class="arr" x1="660" y1="100" x2="660" y2="130"/>
  <line class="arr" x1="660" y1="166" x2="660" y2="180"/>
  <line class="arr" x1="660" y1="216" x2="660" y2="230"/>
  <line class="arr" x1="660" y1="266" x2="660" y2="290"/>
  <path class="arr" stroke="#f9a825" stroke-dasharray="5 4" d="M780,75 C840,200 840,250 760,313"/>
  <text class="desc" x="838" y="195" fill="#f9a825">прямой</text>
  <text class="desc" x="838" y="208" fill="#f9a825">доступ</text>

  <text class="desc" x="660" y="400" fill="#2e7d32">Avatar берёт user сам, минуя промежуточные</text>
  <text class="desc" x="660" y="418" fill="#2e7d32">Меняем модель — правим только владельца и потребителей</text>
</svg>
