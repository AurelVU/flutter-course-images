<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .prov{fill:#fff3e0;stroke:#ef6c00;stroke-width:2;rx:8;ry:8}
    .cons{fill:#e3f2fd;stroke:#1565c0;stroke-width:2;rx:8;ry:8}
    .sel{fill:#f3e5f5;stroke:#6a1b9a;stroke-width:2;rx:8;ry:8}
    .child{fill:#eceff1;stroke:#546e7a;stroke-width:2;rx:8;ry:8}
    .label{font-size:13px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#90a4ae;stroke-width:1.5;fill:none}
    .title{font-size:18px;font-weight:600;fill:#102a43;text-anchor:middle}
  </style>
  <text class="title" x="410" y="28">Provider: где Consumer, Selector и context.watch</text>

  <rect class="prov" x="280" y="60" width="260" height="56"/>
  <text class="label" x="410" y="84">ChangeNotifierProvider</text>
  <text class="desc" x="410" y="102">create: (_) => MovieStore()</text>

  <rect class="child" x="320" y="150" width="180" height="40"/>
  <text class="label" x="410" y="175">MaterialApp</text>

  <rect class="child" x="320" y="210" width="180" height="40"/>
  <text class="label" x="410" y="235">Scaffold</text>

  <!-- three branches -->
  <rect class="cons" x="40" y="280" width="220" height="80"/>
  <text class="label" x="150" y="306">Consumer&lt;MovieStore&gt;</text>
  <text class="desc" x="150" y="324">builder получает store</text>
  <text class="desc" x="150" y="340">ребилдится при любом</text>
  <text class="desc" x="150" y="354">notifyListeners()</text>

  <rect class="sel" x="290" y="280" width="220" height="80"/>
  <text class="label" x="400" y="306">Selector&lt;Store, X&gt;</text>
  <text class="desc" x="400" y="324">selector: (s) => s.favCount</text>
  <text class="desc" x="400" y="340">ребилдится ТОЛЬКО когда</text>
  <text class="desc" x="400" y="354">favCount меняется</text>

  <rect class="cons" x="540" y="280" width="240" height="80"/>
  <text class="label" x="660" y="306">context.watch&lt;Store&gt;()</text>
  <text class="desc" x="660" y="324">внутри build()</text>
  <text class="desc" x="660" y="340">короткая запись Consumer</text>
  <text class="desc" x="660" y="354">подписывается на всё</text>

  <line class="arr" x1="410" y1="116" x2="410" y2="150"/>
  <line class="arr" x1="410" y1="190" x2="410" y2="210"/>
  <line class="arr" x1="410" y1="250" x2="150" y2="280"/>
  <line class="arr" x1="410" y1="250" x2="400" y2="280"/>
  <line class="arr" x1="410" y1="250" x2="660" y2="280"/>

  <text class="desc" x="410" y="410">Provider сидит ВЫШЕ места использования — обычно у корня поддерева</text>
  <text class="desc" x="410" y="428">Чтение через context.read внутри обработчиков (не ребилдит)</text>
</svg>
