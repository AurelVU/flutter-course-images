<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .box{stroke-width:2;rx:8;ry:8}
    .label{font-size:14px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}
    .title{font-size:18px;font-weight:600;fill:#102a43;text-anchor:middle}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>
  <text class="title" x="410" y="32">go_router: URL → маршрут → экран</text>

  <rect class="box" x="40" y="90" width="160" height="80" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="label" x="120" y="124">URL</text>
  <text class="desc" x="120" y="146">/movie/123</text>

  <rect class="box" x="240" y="90" width="200" height="80" fill="#fff3e0" stroke="#ef6c00"/>
  <text class="label" x="340" y="118">GoRouter</text>
  <text class="desc" x="340" y="138">routes: [GoRoute(path)...]</text>
  <text class="desc" x="340" y="156">матчит шаблоны, парсит params</text>

  <rect class="box" x="480" y="90" width="160" height="80" fill="#f3e5f5" stroke="#6a1b9a"/>
  <text class="label" x="560" y="124">Параметры</text>
  <text class="desc" x="560" y="146">id = "123"</text>

  <rect class="box" x="680" y="90" width="120" height="80" fill="#e8f5e9" stroke="#2e7d32"/>
  <text class="label" x="740" y="124">Экран</text>
  <text class="desc" x="740" y="146">MovieDetail</text>

  <line class="arr" x1="200" y1="130" x2="240" y2="130"/>
  <line class="arr" x1="440" y1="130" x2="480" y2="130"/>
  <line class="arr" x1="640" y1="130" x2="680" y2="130"/>

  <text class="desc" x="410" y="220">URL — единый источник правды о текущем экране</text>
  <text class="desc" x="410" y="238">Работает в браузере, deep-link, restore state</text>
</svg>
