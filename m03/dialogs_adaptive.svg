<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .phone{fill:#eceff1;stroke:#102a43;stroke-width:2;rx:18;ry:18}
    .dialog-m{fill:#fff;stroke:#bdbdbd;rx:8;ry:8}
    .dialog-c{fill:#f5f5f7;stroke:#c7c7cc;rx:14;ry:14}
    .btn-m{fill:#1976d2;font-size:13px;font-weight:600}
    .btn-cancel{fill:#757575;font-size:13px;font-weight:600}
    .btn-c{fill:#0a84ff;font-size:14px}
    .title{font-size:18px;font-weight:600;text-anchor:middle;fill:#102a43}
    .platform{font-size:14px;font-weight:600;text-anchor:middle}
    .small{font-size:11px;fill:#486581;text-anchor:middle}
    .head{font-size:15px;fill:#102a43;font-weight:600}
    .body{font-size:12px;fill:#486581}
  </style>
  <text class="title" x="410" y="30">Material AlertDialog vs Cupertino ActionSheet</text>

  <!-- Material dialog on Android phone -->
  <text class="platform" x="200" y="65" fill="#1976d2">Android: showDialog (AlertDialog)</text>
  <rect class="phone" x="80" y="80" width="240" height="350"/>

  <rect class="dialog-m" x="105" y="180" width="190" height="160"/>
  <text class="head" x="120" y="210">Удалить файл?</text>
  <text class="body" x="120" y="232">Это действие нельзя</text>
  <text class="body" x="120" y="248">отменить.</text>
  <text class="btn-cancel" text-anchor="end" x="200" y="320">ОТМЕНА</text>
  <text class="btn-m" text-anchor="end" x="280" y="320">УДАЛИТЬ</text>

  <!-- iOS Cupertino ActionSheet on iPhone -->
  <text class="platform" x="620" y="65" fill="#0a84ff">iOS: showCupertinoModalPopup (ActionSheet)</text>
  <rect class="phone" x="500" y="80" width="240" height="350"/>

  <rect class="dialog-c" x="510" y="240" width="220" height="50"/>
  <text class="body" font-size="11" x="620" y="260" text-anchor="middle">Удалить файл?</text>
  <text class="small" x="620" y="278">Это действие нельзя отменить.</text>
  <line x1="510" y1="290" x2="730" y2="290" stroke="#c7c7cc"/>

  <rect class="dialog-c" x="510" y="290" width="220" height="40"/>
  <text class="btn-c" text-anchor="middle" x="620" y="315" fill="#ff3b30" font-weight="600">Удалить</text>

  <rect class="dialog-c" x="510" y="340" width="220" height="40" rx="14"/>
  <text class="btn-c" text-anchor="middle" x="620" y="365" fill="#0a84ff" font-weight="600">Отмена</text>

  <text class="small" x="410" y="450">showAdaptiveDialog автоматически выбирает по платформе</text>
</svg>
