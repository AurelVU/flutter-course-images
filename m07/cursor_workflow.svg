  <text class="desc" x="118" y="179">bloc.dart</text>
  <text class="desc" x="118" y="196">screen.dart</text>

  <!-- Editor -->
  <rect class="panel" x="225" y="60" width="335" height="200"/>
  <text class="label" x="240" y="85">screen.dart</text>
  <text class="code" x="240" y="110">class MoviesScreen extends StatelessWidget {</text>
  <text class="code" x="240" y="128">  @override</text>
  <text class="code" x="240" y="146">  Widget build(BuildContext context) {</text>
  <text class="code" x="240" y="164">    return Scaffold(</text>
  <text class="code" x="240" y="182">      appBar: AppBar(title: const Text('Films')),</text>
  <!-- Tab suggestion -->
  <rect x="280" y="195" width="240" height="40" fill="#264f78" stroke="#0078d4"/>
  <text font-size="11" fill="#fff" x="288" y="210">    body: BlocBuilder&lt;MoviesBloc,MoviesState&gt;(</text>
  <text font-size="10" fill="#9cdcfe" x="288" y="226">    Tab — принять предложение</text>

  <!-- Chat panel right -->
  <rect class="panel" x="565" y="60" width="195" height="320"/>
  <text class="label" x="580" y="85">CHAT / COMPOSER</text>
  <text class="desc" x="580" y="108">You: Добавь BLoC для</text>
