<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .src{fill:#fffde7;stroke:#f9a825;stroke-width:2;rx:8;ry:8}
    .gen{fill:#e8f5e9;stroke:#2e7d32;stroke-width:2;rx:8;ry:8}
    .tool{fill:#fff3e0;stroke:#ef6c00;stroke-width:2;rx:8;ry:8}
    .label{font-size:14px;fill:#102a43;text-anchor:middle;font-weight:600}
    .small{font-size:11px;fill:#486581;text-anchor:middle}
    .code{font-size:11px;fill:#102a43;font-family:'SF Mono',Menlo,monospace}
    .arr{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}
    .title{font-size:18px;font-weight:600;text-anchor:middle;fill:#102a43}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>
  <text class="title" x="440" y="30">build_runner: freezed + json_serializable</text>

  <rect class="src" x="40" y="80" width="220" height="180"/>
  <text class="label" x="150" y="105">movie.dart</text>
  <text class="small" x="150" y="124">что вы пишете</text>
  <text class="code" x="55" y="148">@freezed</text>
  <text class="code" x="55" y="166">class Movie with _$Movie {</text>
  <text class="code" x="55" y="184">  factory Movie({</text>
  <text class="code" x="55" y="202">    required int id,</text>
  <text class="code" x="55" y="220">    required String title,</text>
  <text class="code" x="55" y="238">  }) = _Movie;</text>
  <text class="code" x="55" y="256">}</text>

  <rect class="tool" x="310" y="140" width="220" height="60"/>
  <text class="label" x="420" y="170">dart run build_runner build</text>
  <text class="small" x="420" y="190">кодогенерация</text>

  <rect class="gen" x="580" y="60" width="260" height="120"/>
  <text class="label" x="710" y="85">movie.freezed.dart</text>
  <text class="small" x="710" y="103">copyWith, ==, hashCode, toString</text>
  <text class="code" x="595" y="125">// сгенерировано автоматически</text>
  <text class="code" x="595" y="143">@JsonSerializable() ...</text>
  <text class="code" x="595" y="161">Movie copyWith({ ... }) ...</text>

  <rect class="gen" x="580" y="200" width="260" height="100"/>
  <text class="label" x="710" y="225">movie.g.dart</text>
  <text class="small" x="710" y="243">fromJson / toJson</text>
  <text class="code" x="595" y="263">_$MovieFromJson(Map json) ...</text>
  <text class="code" x="595" y="281">_$MovieToJson(Movie i) ...</text>

  <line class="arr" x1="260" y1="170" x2="310" y2="170"/>
  <line class="arr" x1="530" y1="160" x2="580" y2="120"/>
  <line class="arr" x1="530" y1="180" x2="580" y2="240"/>

  <text class="small" x="440" y="335">Файлы .freezed.dart и .g.dart коммитим, не правим вручную</text>
</svg>
