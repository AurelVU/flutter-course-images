<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .cubit{fill:#e8f5e9;stroke:#2e7d32;stroke-width:2;rx:8;ry:8}
    .bloc{fill:#fff3e0;stroke:#ef6c00;stroke-width:2;rx:8;ry:8}
    .label{font-size:14px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .code{font-size:11px;fill:#102a43;font-family:'SF Mono',Menlo,monospace;text-anchor:middle}
    .title{font-size:18px;font-weight:600;text-anchor:middle;fill:#102a43}
    .head{font-size:15px;font-weight:600;text-anchor:middle}
  </style>
  <text class="title" x="410" y="30">Cubit vs Bloc</text>

  <rect class="cubit" x="40" y="70" width="340" height="280"/>
  <text class="head" x="210" y="98" fill="#2e7d32">Cubit</text>
  <text class="desc" x="210" y="118">прямые вызовы методов</text>

  <text class="code" x="210" y="155">class CounterCubit extends Cubit&lt;int&gt; {</text>
  <text class="code" x="210" y="173">  CounterCubit() : super(0);</text>
  <text class="code" x="210" y="195">  void increment() =&gt; emit(state + 1);</text>
  <text class="code" x="210" y="213">  void reset() =&gt; emit(0);</text>
  <text class="code" x="210" y="231">}</text>

  <text class="desc" x="210" y="265">UI вызывает методы напрямую:</text>
  <text class="code" x="210" y="283">context.read&lt;CounterCubit&gt;().increment();</text>

  <text class="desc" x="210" y="318">Меньше boilerplate, проще читать</text>
  <text class="desc" x="210" y="336">Идеален для простых сценариев</text>

  <rect class="bloc" x="440" y="70" width="340" height="280"/>
  <text class="head" x="610" y="98" fill="#ef6c00">Bloc</text>
  <text class="desc" x="610" y="118">события через add(...)</text>

  <text class="code" x="610" y="155">class CounterBloc extends Bloc&lt;CountEvent,int&gt; {</text>
  <text class="code" x="610" y="173">  CounterBloc() : super(0) {</text>
  <text class="code" x="610" y="195">    on&lt;Increment&gt;((e, emit) =&gt; emit(state + 1));</text>
  <text class="code" x="610" y="213">    on&lt;Reset&gt;((e, emit) =&gt; emit(0));</text>
  <text class="code" x="610" y="231">  }}</text>

  <text class="desc" x="610" y="265">UI шлёт события:</text>
  <text class="code" x="610" y="283">context.read&lt;CounterBloc&gt;().add(Increment());</text>

  <text class="desc" x="610" y="318">События логируются, легко тестировать</text>
  <text class="desc" x="610" y="336">Лучше для сложных сценариев</text>
</svg>
