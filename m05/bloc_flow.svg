<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .ui{fill:#e3f2fd;stroke:#1565c0;stroke-width:2;rx:8;ry:8}
    .ev{fill:#fff3e0;stroke:#ef6c00;stroke-width:2;rx:8;ry:8}
    .bloc{fill:#f3e5f5;stroke:#6a1b9a;stroke-width:2;rx:8;ry:8}
    .st{fill:#e8f5e9;stroke:#2e7d32;stroke-width:2;rx:8;ry:8}
    .label{font-size:14px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#455a64;stroke-width:2.2;fill:none;marker-end:url(#a)}
    .title{font-size:18px;font-weight:600;fill:#102a43;text-anchor:middle}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>
  <text class="title" x="430" y="30">BLoC: однонаправленный поток данных</text>

  <rect class="ui" x="40" y="80" width="180" height="80"/>
  <text class="label" x="130" y="110">UI</text>
  <text class="desc" x="130" y="128">пользователь жмёт</text>
  <text class="desc" x="130" y="144">кнопку «Загрузить»</text>

  <rect class="ev" x="270" y="80" width="180" height="80"/>
  <text class="label" x="360" y="110">Event</text>
  <text class="desc" x="360" y="128">LoadMoviesRequested()</text>
  <text class="desc" x="360" y="144">context.read&lt;Bloc&gt;().add(...)</text>

  <rect class="bloc" x="500" y="80" width="180" height="80"/>
  <text class="label" x="590" y="110">Bloc</text>
  <text class="desc" x="590" y="128">on&lt;LoadMovies&gt;</text>
  <text class="desc" x="590" y="144">async обработка</text>

  <rect class="st" x="730" y="80" width="100" height="80"/>
  <text class="label" x="780" y="116">State</text>
  <text class="desc" x="780" y="134">Loading</text>
  <text class="desc" x="780" y="148">Loaded / Error</text>

  <line class="arr" x1="220" y1="120" x2="270" y2="120"/>
  <line class="arr" x1="450" y1="120" x2="500" y2="120"/>
  <line class="arr" x1="680" y1="120" x2="730" y2="120"/>

  <!-- back to UI -->
  <rect class="ui" x="280" y="240" width="320" height="80"/>
  <text class="label" x="440" y="270">BlocBuilder&lt;Bloc, State&gt;</text>
  <text class="desc" x="440" y="290">builder получает новое state</text>
  <text class="desc" x="440" y="306">перерисовывает виджеты</text>

  <path class="arr" d="M780,160 C780,210 600,235 440,240"/>

  <text class="desc" x="430" y="350">Поток ВСЕГДА в одну сторону: event → bloc → state → UI</text>
</svg>
