<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .box{fill:#e3f2fd;stroke:#1976d2;stroke-width:2;rx:6;ry:6}
    .leaf{fill:#fff3e0;stroke:#ef6c00;stroke-width:2;rx:6;ry:6}
    .label{font-size:14px;fill:#102a43;text-anchor:middle}
    .small{font-size:11px;fill:#486581;text-anchor:middle}
    .edge{stroke:#90a4ae;stroke-width:1.5;fill:none}
    .title{font-size:18px;font-weight:600;fill:#102a43;text-anchor:middle}
  </style>
  <text class="title" x="380" y="28">Дерево виджетов Flutter</text>

  <!-- MaterialApp -->
  <rect class="box" x="310" y="60" width="140" height="44" rx="6"/>
  <text class="label" x="380" y="86">MaterialApp</text>

  <!-- Scaffold -->
  <rect class="box" x="310" y="140" width="140" height="44" rx="6"/>
  <text class="label" x="380" y="166">Scaffold</text>

  <!-- AppBar / Body / FAB row -->
  <rect class="box" x="80" y="220" width="140" height="44" rx="6"/>
  <text class="label" x="150" y="246">AppBar</text>

  <rect class="box" x="310" y="220" width="140" height="44" rx="6"/>
  <text class="label" x="380" y="246">Column (body)</text>

  <rect class="box" x="540" y="220" width="180" height="44" rx="6"/>
  <text class="label" x="630" y="246">FloatingActionButton</text>

  <!-- Children of Column -->
  <rect class="leaf" x="200" y="320" width="120" height="44" rx="6"/>
  <text class="label" x="260" y="346">Text</text>

  <rect class="box" x="340" y="320" width="120" height="44" rx="6"/>
  <text class="label" x="400" y="346">Padding</text>

  <rect class="leaf" x="480" y="320" width="120" height="44" rx="6"/>
  <text class="label" x="540" y="346">Icon</text>

  <!-- Padding child -->
  <rect class="leaf" x="340" y="400" width="120" height="44" rx="6"/>
  <text class="label" x="400" y="426">ElevatedButton</text>

  <!-- edges -->
  <line class="edge" x1="380" y1="104" x2="380" y2="140"/>
  <line class="edge" x1="380" y1="184" x2="380" y2="220"/>
  <line class="edge" x1="380" y1="184" x2="150" y2="220"/>
  <line class="edge" x1="380" y1="184" x2="630" y2="220"/>
  <line class="edge" x1="380" y1="264" x2="260" y2="320"/>
  <line class="edge" x1="380" y1="264" x2="400" y2="320"/>
  <line class="edge" x1="380" y1="264" x2="540" y2="320"/>
  <line class="edge" x1="400" y1="364" x2="400" y2="400"/>

  <text class="small" x="380" y="465">Всё в Flutter — виджет: композиция, а не наследование</text>
</svg>
