<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .box{stroke-width:2;rx:8;ry:8}
    .app{fill:#e3f2fd;stroke:#1565c0}
    .adapter{fill:#fff3e0;stroke:#ef6c00}
    .box-h{fill:#e8f5e9;stroke:#2e7d32}
    .disk{fill:#f5f5f5;stroke:#757575}
    .label{font-size:13px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}
    .title{font-size:18px;font-weight:600;text-anchor:middle;fill:#102a43}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>
  <text class="title" x="410" y="30">Hive: локальное хранилище</text>

  <rect class="box app" x="40" y="80" width="200" height="80"/>
  <text class="label" x="140" y="108">Ваш Dart-код</text>
  <text class="desc" x="140" y="128">box.put('movie_1', movie)</text>
  <text class="desc" x="140" y="144">box.get&lt;Movie&gt;('movie_1')</text>

  <rect class="box adapter" x="290" y="80" width="200" height="80"/>
  <text class="label" x="390" y="108">TypeAdapter</text>
  <text class="desc" x="390" y="128">@HiveType(typeId: 0)</text>
  <text class="desc" x="390" y="144">сериализация Movie в байты</text>

  <rect class="box box-h" x="540" y="80" width="200" height="80"/>
  <text class="label" x="640" y="108">Hive.box('movies')</text>
  <text class="desc" x="640" y="128">key-value хранилище</text>
  <text class="desc" x="640" y="144">в памяти + на диске</text>

  <rect class="box disk" x="290" y="220" width="450" height="60"/>
  <text class="label" x="515" y="245">Файлы на устройстве</text>
  <text class="desc" x="515" y="265">/data/data/com.app/files/movies.hive</text>

  <line class="arr" x1="240" y1="120" x2="290" y2="120"/>
  <line class="arr" x1="490" y1="120" x2="540" y2="120"/>
  <path class="arr" d="M640,160 C640,200 515,210 515,220"/>

  <text class="desc" x="410" y="340">Не требует SQL, не требует таблиц — просто записывайте объекты</text>
  <text class="desc" x="410" y="358">Идеально для офлайн-кеша, избранного, настроек</text>
</svg>
