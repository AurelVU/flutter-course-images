<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .box{stroke-width:2;rx:8;ry:8}
    .label{font-size:13px;fill:#102a43;text-anchor:middle;font-weight:600}
    .desc{font-size:11px;fill:#486581;text-anchor:middle}
    .arr{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}
    .title{font-size:18px;font-weight:600;fill:#102a43;text-anchor:middle}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>
  <text class="title" x="420" y="30">Подпись APK / AAB для Android</text>

  <rect class="box" x="40" y="90" width="180" height="80" fill="#fff3e0" stroke="#ef6c00"/>
  <text class="label" x="130" y="118">keytool</text>
  <text class="desc" x="130" y="138">генерирует keystore</text>
  <text class="desc" x="130" y="154">.jks файл + пароль</text>

  <rect class="box" x="270" y="90" width="200" height="80" fill="#fffde7" stroke="#f9a825"/>
  <text class="label" x="370" y="115">key.properties</text>
  <text class="desc" x="370" y="133">storeFile, storePassword</text>
  <text class="desc" x="370" y="149">keyAlias, keyPassword</text>
  <text class="desc" x="370" y="163">(в .gitignore!)</text>

  <rect class="box" x="520" y="90" width="200" height="80" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="label" x="620" y="115">android/app/build.gradle</text>
  <text class="desc" x="620" y="133">signingConfigs { release }</text>
  <text class="desc" x="620" y="149">buildTypes.release</text>
  <text class="desc" x="620" y="165">→ signingConfig release</text>

  <line class="arr" x1="220" y1="130" x2="270" y2="130"/>
  <line class="arr" x1="470" y1="130" x2="520" y2="130"/>

  <rect class="box" x="270" y="220" width="200" height="80" fill="#e8f5e9" stroke="#2e7d32"/>
  <text class="label" x="370" y="250">flutter build apk --release</text>
  <text class="desc" x="370" y="268">или build appbundle</text>
  <text class="desc" x="370" y="284">→ build/app/outputs/...</text>

  <path class="arr" d="M620,170 C620,200 470,210 370,220"/>
  <text class="desc" x="370" y="338">Один и тот же keystore хранит подпись на всё время жизни приложения</text>
</svg>
